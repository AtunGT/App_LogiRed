name: logired
description: LogiRed - App de logística
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  provider: ^6.1.2

  dio: ^5.7.0

  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2

  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  firebase_messaging: ^15.1.3
  google_sign_in: ^6.2.0

  google_maps_flutter: ^2.9.0
  google_places_flutter: ^2.0.9
  geolocator: ^14.0.0
  geocoding: ^4.0.0
  permission_handler: ^11.3.0

  cached_network_image: ^3.4.1
  image_picker: ^1.1.2

  go_router: ^14.3.0

  flutter_stripe: ^13.0.0

  web_socket_channel: ^3.0.1

  flutter_tts: ^4.2.0

  flutter_compass: ^0.8.1

  wakelock_plus: ^1.2.8

  flutter_local_notifications: ^18.0.1

  url_launcher: ^6.3.0
  device_info_plus: ^11.0.0
  jwt_decoder: ^2.0.1
  intl: ^0.20.2
  http_parser: ^4.0.2
  screen_protector: ^1.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  background_color_ios: "#FFFFFF"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
